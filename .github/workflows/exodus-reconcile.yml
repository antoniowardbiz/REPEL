name: Exodus Cost Reconciler
on:
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:
  push:
    paths:
      - "cost_tracker/**"
      - ".github/workflows/exodus-reconcile.yml"
concurrency:
  group: exodus-reconcile
  cancel-in-progress: false
jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r cost_tracker/requirements.txt
      - env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: python cost_tracker/reconcile.py
