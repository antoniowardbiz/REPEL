name: Exodus Cost Reconciler

on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:
  push:
    paths:
      - "data/exodus/**.csv"
      - "cost_tracker/**"
      - ".github/workflows/exodus-reconcile.yml"

concurrency:
  group: exodus-reconcile
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r cost_tracker/requirements.txt
      - name: Run reconciler
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: python cost_tracker/reconcile.py
